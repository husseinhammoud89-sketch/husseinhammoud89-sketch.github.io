<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1200px;
      height: 630px;
      background: #f1efec;
      font-family: 'Space Grotesk', sans-serif;
      color: #151515;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    .lines {
      position: absolute;
      inset: 0;
      display: flex;
      gap: calc(100% / 10);
    }
    .lines span {
      display: block;
      width: 1px;
      height: 100%;
      background: rgba(21,21,21,0.06);
      flex-shrink: 0;
    }
    .inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      position: relative;
    }
    .row1 {
      display: flex;
      align-items: center;
      gap: 24px;
    }
    .name {
      font-size: 88px;
      font-weight: 300;
      letter-spacing: -5px;
      line-height: 1;
    }
    .role {
      font-size: 96px;
      font-weight: 700;
      letter-spacing: -5px;
      line-height: 1.1;
    }
    .tagline {
      font-size: 26px;
      font-weight: 500;
      letter-spacing: -1px;
      color: rgba(21,21,21,0.55);
      margin-top: 28px;
    }
  </style>
</head>
<body>
  <div class="lines"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div>
  <div class="inner">
    <div class="row1">
      <svg viewBox="0 0 160 160" width="72" height="72" fill="none" xmlns="http://www.w3.org/2000/svg" stroke="#151515" stroke-width="16" stroke-linecap="square"><line x1="80" y1="8" x2="80" y2="152"/><line x1="8" y1="80" x2="152" y2="80"/><line x1="26" y1="26" x2="134" y2="134"/><line x1="134" y1="26" x2="26" y2="134"/></svg>
      <div class="name">Hussein Hammoud</div>
    </div>
    <div class="role">Product designer</div>
    <div class="tagline">Design that thinks before it looks.</div>
  </div>
</body>
</html>
